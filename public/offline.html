<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>RiderShield — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0a1a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      padding-left: calc(24px + env(safe-area-inset-left));
      padding-right: calc(24px + env(safe-area-inset-right));
      text-align: center;
      gap: 0;
    }
    .shield {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      filter: drop-shadow(0 0 24px rgba(124,58,237,0.5));
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 15px;
      color: #9ca3af;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 32px;
    }
    .features {
      list-style: none;
      width: 100%;
      max-width: 300px;
      margin-bottom: 36px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .features li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      color: #c4b5fd;
      text-align: left;
    }
    .features li .icon { font-size: 20px; flex-shrink: 0; }
    .btn {
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:active { opacity: 0.8; transform: scale(0.97); }
    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #6b7280;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="shield">🛡️</div>
  <h1>You're offline</h1>
  <p class="subtitle">
    Your data is safe and will sync automatically when you reconnect.
  </p>
  <ul class="features">
    <li><span class="icon">🚨</span> Emergency contacts still accessible</li>
    <li><span class="icon">🗺️</span> Last cached map available</li>
    <li><span class="icon">👥</span> Group info saved locally</li>
  </ul>
  <button class="btn" onclick="window.location.reload()">Try again</button>
  <p class="status"><span class="dot"></span>No internet connection</p>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
